# Cloudflare Tunnel Configuration
# Maps local ports to Cloudflare domain names
#
# Setup Instructions:
# 1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/install-and-setup/installation/
# 2. Run: cloudflared tunnel login
# 3. Run: cloudflared tunnel create <tunnel-name>
# 4. Update tunnel_id below with your tunnel ID
# 5. Run: cloudflared tunnel route dns <tunnel-name> <subdomain>.<your-domain.com>
# 6. Start tunnel: cloudflared tunnel run <tunnel-name>

tunnel: <YOUR_TUNNEL_ID>
credentials-file: C:\Coding Projects\Manager\.cloudflared\<YOUR_TUNNEL_ID>.json

ingress:
  # TWIFO Import Dropbox (Streamlit - Port 8009)
  - hostname: import-dropbox.hcresearch.ltd
    service: http://localhost:8009
  
  # Price Dashboard (Port 8002)
